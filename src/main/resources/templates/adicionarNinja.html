<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Ninja | GitHub Style</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>

<h1>Adicionar Novo Ninja</h1>

<div class="form-container">
    <div th:if="${mensagem}" class="mensagem" th:text="${mensagem}"></div>

    <form th:action="@{/ninjas/ui/salvar}" th:object="${ninja}" method="post">

        <label for="nome">Nome:</label>
        <input type="text" id="nome" th:field="*{nome}" placeholder="Ex: Sasuke Uchiha" required />

        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" placeholder="contato@vila.com" required />

        <label for="imgUrl">URL da Imagem:</label>
        <input type="text" id="imgUrl" th:field="*{imgUrl}" placeholder="http://link-da-foto.jpg" required />

        <label for="idade">Idade:</label>
        <input type="number" id="idade" th:field="*{idade}" required />

        <label for="rank">Rank:</label>
        <input type="text" id="rank" th:field="*{rank}" placeholder="Ex: Jounin" />

        <label for="missao">Designar Missão:</label>
        <select th:field="*{missoes.id}" id="missao">
            <option value="">Selecione uma missão...</option>
            <option th:each="m : ${missoes}"
                    th:value="${m.id}"
                    th:text="${m.nome} + ' (' + ${m.dificuldade} + ')'">
            </option>
        </select>

        <button type="submit" class="btn-primary" style="margin-top: 20px; width: 100%;">Cadastrar Ninja</button>
    </form>

    <a th:href="@{/ninjas/ui/listar}" style="display: block; text-align: center; margin-top: 15px; text-decoration: none; color: var(--text-muted); font-size: 14px;">
        Voltar para a lista de ninjas
    </a>
</div>

</body>
</html>
